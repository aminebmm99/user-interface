<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineMax</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<nav>
  <div class="logo">CineMax</div>
  <span onclick="showPage('films')">Films</span>
</nav>


<div class="page active" id="page-films">
  <h2>Films à l'affiche</h2>
  <div class="films-grid" id="filmsGrid"></div>
</div>

<
<div class="page" id="page-seances">
  <button class="back-btn" onclick="showPage('films')">Retour</button>
  <div class="film-detail" id="filmDetail"></div>

  <h3 class="seances-title">Choisir une séance</h3>
  <div class="seances-grid" id="seancesGrid"></div>

  <div class="resa-form" id="resaForm">
    <h3>Votre réservation</h3>

    <div class="form-group">
      <label>Nom complet</label>
      <input type="text" id="inputNom">
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="inputEmail">
    </div>

    <div class="tickets-row">
      <label>Tickets</label>
      <div class="counter">
        <button onclick="changeTickets(-1)">-</button>
        <span id="ticketCount">1</span>
        <button onclick="changeTickets(1)">+</button>
      </div>
    </div>

    <div class="price-row">
      <span id="priceLabel">1 ticket × 9,50€</span>
      <span id="priceTotal">9,50€</span>
    </div>

    <button class="btn-confirm" onclick="confirmer()">Confirmer</button>
  </div>
</div>


<div class="page" id="page-confirmation">
  <div class="confirm-box">
    <h2>Réservation confirmée</h2>
    <div class="code" id="confirmCode"></div>
    <div class="recap" id="confirmRecap"></div>
    <button class="btn-back-home" onclick="showPage('films')">
      Retour aux films
    </button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
